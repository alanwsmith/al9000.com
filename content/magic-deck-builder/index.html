[! extends "__wrappers/main.html" !]


[! set stylesheets = ["/magic-deck-builder/styles.css"] !]

[! block main !]
<bitty-8-0 data-connect="/magic-deck-builder/builder.js"></bitty-8-0>

<hgroup>
  <h1>Magic Deck Builder</h1>
</hgroup>

<div class="columns">
  <div class="content">
    <div data-r="results"></div>
  </div>

  <div class="sidebar">
    <div>
      Results: <span data-r="cardCount"></span>
    </div>
    <div>
      <label class="block" for="nameSearch">Name:</label>
      <input type="search" id="nameSearch" data-r="displayNameSearch"  data-s="search" autocomplete="off" />
    </div>

    <div>
      <label class="block" for="typeSearch">Type:</label>
      <input type="search" id="typeSearch" data-r="displayTypeSearch"  data-s="search" autocomplete="off" />
    </div>

    <div>
      <label class="block" for="textSearch">Text:</label>
      <input type="search" id="textSearch" data-r="displayTextSearch"  data-s="search" autocomplete="off" />
    </div>
    <div>
      Colors:
      <div data-r="uiColors"></div>
    </div>
    <div>
      <label class="block" for="excludeType">Exclude Type</label>
      <input type="search" id="excludeType" data-r="displayExcludeType"  data-s="search" autocomplete="off" />
    </div>
    <div>
      <label class="block" for="excludeText">Exclude Text</label>
      <input type="search" id="excludeText" data-r="displayExcludeText"  data-s="search" autocomplete="off" />
    </div>
    <div>
      <label class="block" for="pageNumber">Page:</label>
      <button data-s="previousPage">&lt;</button>
      <input size="3" type="text" id="pageNumber" data-r="displayPageNumber" data-s="changePage" autocomplete="off" />
      <button data-s="nextPage">&gt;</button>
    </div>
    <div data-r="uiDebuggingSwitch"></div>
  </div>
</div>


[! endblock !]



[! block templates !]
<script type="text/html" id="colorTemplate">
<label class="block">
  <input data-r="displayColorCheckbox" data-key="__COLOR_KEY__" type="checkbox" data-s="search" />
  __COLOR_NAME__ 
</label>
</script>

<script type="text/html" id="cardTemplate">
<div class="card">
  <img src="__IMG_SRC__" alt="__CARD_NAME__ from Magic: The Gathering" />
</div>
</script>
[! endblock !]


[! block main_classes !]
full-wrapper default-flow
[! endblock !]
