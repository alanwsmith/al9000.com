[! extends "__wrappers/main.html" !]


[! set stylesheets = [
  "/magic-deck-builder/styles.css"
] !]

[! block main !]
<bitty-8-0 data-connect="/magic-deck-builder/builder.js"></bitty-8-0>

<hgroup>
  <h1>Magic Deck Builder</h1>
</hgroup>

<div class="columns">
  <div class="sidebar">
    <div>
      Results: <span data-r="resultCount"></span>
    </div>
    <div>
      <label class="block" for="typeLineSearch">Card Name:</label>
      <input type="search" data-r="display_nameSearch"  data-s="search" autocomplete="off" />
    </div>
    <div>
      Colors:
      <div data-r="ui_colors"></div>
    </div>
  </div>
  <div class="content">
    <div data-r="results"></div>
  </div>
</div>

<div data-r="ui_debuggingSwitch"></div>

[! endblock !]



[! block templates !]
<script type="text/html" id="colorTemplate">
<label class="block">
  <input data-r="display_colorCheckbox" data-key="__COLOR_KEY__" type="checkbox" data-s="search" />
  __COLOR_NAME__ 
</label>
</script>

<script type="text/html" id="cardTemplate">
<div class="card">
  <div>__CARD_NAME__</div>
  <div>__CARD_ID__</div>
  <img src="__IMG_SRC__" alt="__CARD_NAME__ from Magic: The Gathering" />
</div>
</script>
[! endblock !]
