[! extends "__wrappers/main.html" !]


[! set stylesheets = [
  "/magic-deck-builder/styles.css"
] !]

[! block main !]
<bitty-8-0 data-connect="/magic-deck-builder/builder.js"></bitty-8-0>

<hgroup>
  <h1>Magic Deck Builder</h1>
</hgroup>

<div class="columns">
  <div class="sidebar">
    <div>
      <label class="block" for="typeLineSearch">Card Name:</label>
      <input type="search" data-r="uiCardName"  data-s="search" autocomplete="off" />
    </div>
    <div>
      Colors:
      <div data-r="uiColors"></div>
    </div>
  </div>
  <div class="content">
    <div data-r="results"></div>
  </div>
</div>


[! endblock !]



[! block templates !]

<script type="text/html" id="colorTemplate">
<label class="block">
  <input class="isColor" data-color="__COLOR_CODE__" type="checkbox" data-s="search" __ID_CHECKED__ />
  <input class="hasColor" data-color="__COLOR_CODE__" type="checkbox" data-s="search" __COLORS_CHECKED__ />
  __COLOR_NAME__ 
</label>
</script>

<script type="text/html" id="cardTemplate">
<div 
<div>__CARD_NAME__</div>
<img src="" alt="__CARD_NAME__ from Magic: The Gathering" />
</script>



[! endblock !]
