<form id="encryptForm">
  <label>
    <div>File To Encrypt:</div>
    <input type="file" id="fileToEncrypt" />
  </label>

  <label>
    <div>Password to use:</div>
    <input type="password" id="password" />
  </label>

  <label>
    <div>Salt to use:</div>
    <input type="password" id="salt" />
  </label>

  <div>
    <input type="submit" value="Encrypt File" />
  </div>
</form>
