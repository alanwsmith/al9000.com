[! extends "__wrappers/main.html" !]


[! set stylesheets = ["/magic-deck-builder/styles.css"] !]

[! block main !]
<bitty-8-0 data-connect="/magic-deck-builder/builder.js"></bitty-8-0>

<hgroup>
  <h1>Magic Deck Builder</h1>
</hgroup>

<div class="columns">
  <div class="content">
    <div data-r="results"></div>
  </div>

  <div class="sidebar default-flow">
    <div class="default-bottom-border default-bottom-padding small-bottom-margin">
      <label class="block" for="name_search">Name</label>
      <input data-s="search" data-r="displayNameSearch" data-save="true" type="search" id="name_search" autocomplete="off" />
    </div>

    <div>
      <div class="inputSelect">
        <label for="type_line_search_include">Type:</label>
        <select data-s="selectOption" data-r="uiOptions" data-key="type_line"></select>
      </div>
      <input data-s="search" data-r="selectOption" data-key="type_line" data-include="true" data-save="true" type="search" id="type_line_search_include" autocomplete="off" />
    </div>

    <div>
      <div class="inputSelect">
        <label for="oracle_text_search_include">Text:</label>
        <select data-s="selectOption" data-r="uiOptions" data-key="oracle_text"></select>
      </div>
      <input data-s="search" data-r="selectOption" data-key="oracle_text" data-include="true" data-save="true" type="search" id="oracle_text_search_include" autocomplete="off" />
    </div>

    <div>
      Colors: <div data-r="uiColors"></div>
    </div>

    <div>
      <div class="inputSelect">
        <label for="type_line_search_exclude">Exclude Type:</label>
        <button data-s="excludeDefaults" data-r="excludeDefaults" data-key="type_line">default</button>
      </div>
      <input data-s="search" data-r="excludeDefaults" data-key="type_line" data-include="false" data-save="true" type="search" id="type_line_search_exclude" autocomplete="off" />
    </div>

    <div>
      <div class="inputSelect">
        <label for="oracle_text_search_exclude">Exclude Text:</label>
        <button data-s="excludeDefaults" data-r="excludeDefaults" data-key="oracle_text">default</button>
      </div>
      <input data-s="search" data-r="excludeDefaults" data-key="oracle_text" data-include="false" data-save="true" type="search" id="oraclue_text_search_exclude" autocomplete="off" />
    </div>

    <div>
      <div>Results: <span data-r="cardCount"></span></div>
      <label class="block" for="pageNumber">Page:</label>
      <button data-s="previousPage">&lt;</button>
      <input data-s="changePage" data-r="displayPageNumber nextPage previousPage" data-save="true" size="3" type="text" id="pageNumber" autocomplete="off" />
      <button data-s="nextPage">&gt;</button>
    </div>
    <div data-r="uiDebuggingSwitch"></div>


    <div data-r="testQueryBuilder"></div>

    [#
    <div>
      <button data-s="resetState">reset state</button>
    </div>
    #]
  </div>
</div>
[! endblock !]



[! block templates !]
<script type="text/html" id="colorTemplate">
  <label class="block">
    <input data-s="search" data-r="displayColorCheckbox" data-key="__COLOR_KEY__" data-save="true" id="color_checkbox___COLOR_KEY__" type="checkbox" />
    __COLOR_NAME__ 
  </label>
</script>

<script type="text/html" id="cardTemplate">
  <div class="card">
    <img src="__IMG_SRC__" alt="__CARD_NAME__ from Magic: The Gathering" />
      [#
    <details>
      <div>__CARD_NAME__</div>
      <div>__CARD_TYPE__</div>
      <div>__CARD_TEXT__</div>
      <div>__CARD_ID__</div>
    </details>
      #]
  </div>
</script>

<script type="text/html" id="optionTemplate">
  <option value="__VALUE__">__VALUE__</option>
</script>

<script type="text/html" id="optionSpacerTemplate">
  <option value="">---</option>
</script>

[! endblock !]


[! block main_classes !]
full-wrapper default-flow
[! endblock !]
