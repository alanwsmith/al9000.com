== extends "/tools/tools/templates.inc/default.html"

== block toml
link_text = "Ratio Converter"
== endblock


== block main

<div>
  Formula for Width: 
  STARTING_WIDTH * OUTPUT_HEIGHT / STARTING_HEIGHT
</div>
<div>
  Formula for Height: STARTING_HEIGHT * OUTPUT_WIDTH / STARTING_WIDTH
</div>

<div class="two-columns-left">
  <label for="widthInRatio">Input Width</label>
  <input id="widthInRatio" type="number" autocomplete="off" value="16" data-s="update" />
  <label for="heightInRatio">Input Height</label>
  <input id="heightInRatio" type="number" autocompelte="off" value="9" data-s="update" />

  <label for="widthOutRatio">Output Width</label>
  <div class="two-columns-right">
  <input id="widthOutRatio" type="number" autocomplete="off" value="80" data-s="update" data-r="update copyRatio" data-key="width" />
    <button data-s="copyRatio" data-key="width">Copy</button>
  </div>

  <label for="heightOutRatio">Output Height</label>
  <div class="two-columns-right">
  <input id="heightOutRatio" type="number" autocomplete="off" data-s="update" data-r="update copyRatio" data-key="height" />
    <button data-s="copyRatio" data-key="height">Copy</button>
  </div>

</div>

== endblock
