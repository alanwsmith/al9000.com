<div class="two-columns">
  <div>
    <textarea class="d" data-s="update[@ key @]" data-r="show[@ key @]Example clear[@ key @]" autocomplete="off"></textarea>
    <button data-s="show[@ key @]Example">Show Example</button>
    <button data-s="clear[@ key @]">Clear Input</button>
  </div>
  <div>
    <textarea class="d" data-r="update[@ key @] copy[@ key @]" autocomplete="off"></textarea>
    <div class="text-align-right">
      <button data-s="copy[@ key @]">Copy Lines</button>
    </div>
  </div>
</div>
